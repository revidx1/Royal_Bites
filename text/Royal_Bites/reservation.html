<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <title>Royal Bites | Reservation</title>
</head>
<body>
    <button onclick="window.location.href='index.html'">Retour à l'accueil</button>
    <nav class="navbar">
        <div class="nav-logo">Royal Bites</div>
        <button class="nav-toggle" aria-label="Toggle navigation" onclick="toggleNav()">
            <span class="hamburger"></span>
        </button>
        <ul class="nav-links">
            <li class="nav-item"><a href="index.html">Accueil</a></li>
            <li class="nav-item"><a href="menu.html">Menu</a></li>
            <li class="nav-item"><a href="gallery.html">Galerie</a></li>
            <li class="nav-item"><a href="reservation.html">Réserver</a></li>
            <li class="nav-item"><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
    
    <div class="reservation-container">
        <h1>Réservez votre table</h1>
        <p class="reservation-subtitle">Rejoignez-nous pour une expérience culinaire inoubliable</p>
        
        <form id="reservationForm" class="reservation-form">
            <div class="form-group">
                <label for="name">Nom complet *</label>
                <input type="text" id="name" name="name" required placeholder="Votre nom">
            </div>
            
            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required placeholder="votre@email.com">
            </div>
            
            <div class="form-group">
                <label for="phone">Téléphone *</label>
                <input type="tel" id="phone" name="phone" required placeholder="+212 (0)X XX XX XX XX" inputmode="tel" minlength="10" maxlength="20">
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="date">Date *</label>
                    <input type="date" id="date" name="date" required>
                </div>
                
                <div class="form-group">
                    <label for="time">Heure *</label>
                    <input type="time" id="time" name="time" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="guests">Nombre de personnes *</label>
                <select id="guests" name="guests" required>
                    <option value="">Sélectionnez le nombre de personnes</option>
                    <option value="1">1 personne</option>
                    <option value="2">2 personnes</option>
                    <option value="3">3 personnes</option>
                    <option value="4">4 personnes</option>
                    <option value="5">5 personnes</option>
                    <option value="6">6 personnes</option>
                    <option value="7">7 personnes</option>
                    <option value="8">8 personnes</option>
                    <option value="9">9 personnes</option>
                    <option value="10">10+ personnes</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="occasions">Occasion spéciale (optionnel)</label>
                <select id="occasions" name="occasions">
                    <option value="">Aucune</option>
                    <option value="anniversaire">Anniversaire</option>
                    <option value="fiancailles">Fiançailles</option>
                    <option value="mariage">Mariage</option>
                    <option value="reunion-affaires">Réunion d'affaires</option>
                    <option value="famille">Réunion de famille</option>
                    <option value="autre">Autre</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="preferences">Préférences ou allergies</label>
                <textarea id="preferences" name="preferences" placeholder="Partagez vos préférences ou allergies..."></textarea>
            </div>
            
            <button type="submit" class="btn-submit">Réserver une table</button>
        </form>
        
        <div id="successMessage" class="success-message">
            <h3>Réservation confirmée !</h3>
            <p>Merci de votre réservation. Nous vous attendons chez Royal Bites.</p>
        </div>
    </div>
    
</body>
</html>
